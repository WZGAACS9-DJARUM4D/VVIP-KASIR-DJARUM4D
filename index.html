           TEMA LUXURY CYBERPUNK - HIGH BRIGHTNESS TRANSPARENT GLASS

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            /* GAMBAR BACKGROUND UTAMA PENUH DAN TERANG */
            background-image: url('https://i.postimg.cc/Qtr62Sj9/33dbb62a69c492ee4a0e158032c50ac5.jpg');
            background-size: cover;
            background-position: center center;

            background-attachment: fixed;
            color: #f1f1f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column; 
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Container Utama - Super Transparan Bening ala Kaca Mewah */
        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(11, 5, 18, 0.45); 
            backdrop-filter: blur(6px) saturate(140%);
            -webkit-backdrop-filter: blur(6px) saturate(140%);
            padding: 35px;
            border-radius: 20px;
            position: relative;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                0 0 25px rgba(0, 240, 255, 0.25), 
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.45); 
            overflow: hidden;
            margin-bottom: 30px; /* Jarak aman sebelum masuk ke area bawah (carousel) */
        }

        /* Elemen Pembungkus Logo GIF Atas */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 25px;
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            max-height: 90px; 
            filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.6)); 
        }

        /* Judul Sistem */
        h2 {
            margin-top: 0;
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 240, 255, 0.3);
            padding-bottom: 15px;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 
                0 0 8px rgba(255, 255, 255, 0.8),

        .form-group {

        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: #ffffff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }

        /* Kotak Masukan Teks */
        textarea {
            width: 100%;
            height: 130px;
            padding: 16px;
            background-color: rgba(5, 2, 8, 0.75);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            box-sizing: border-box;

        }

        textarea:focus {
            outline: none;

            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.8),

    <script>
        // Logika Aktivasi Silder Carousel Anda
        $(document).ready(function(){
            $(".owl-carousel.gameicon").owlCarousel({
                loop: true,
                margin: 20,              
                nav: false,              
                dots: true,              
                autoplay: true,          
                autoplayTimeout: 3500,   
                smartSpeed: 800,         
                responsive:{
                    0:{ items: 1 },
                    576:{ items: 2 },
                    992:{ items: 3 },
                    1200:{ items: 4 }    
                }
            });
        });

        // Logika Inti Pemilah Log Transaksi (100% Utuh & Aman)
        function submitData() {
            const inputField = document.getElementById('inputData');
            const tableBody = document.getElementById('tableBody');
            const emptyRow = document.getElementById('emptyRow');
            
            let rawText = inputField.value.trim();

            if (rawText === "") {
                alert("Kolom data masih kosong! Silakan isi terlebih dahulu.");
                return;
            }

            if (emptyRow) {
                emptyRow.remove();
            }

            const blocks = rawText.split('ACCEPT');
            let dataFound = false;

            blocks.forEach(block => {
                if (block.includes('Withdraw')) {
                    dataFound = true;

                    const parts = block.split('Withdraw');
                    const kiriWithdraw = parts[0].trim();  
                    const kananWithdraw = parts[1].trim(); 

                    const timeMatch = kiriWithdraw.match(/\d{2}:\d{2}:\d{2}/);
                    let waktu = "-";
                    let userId = "-";

                    if (timeMatch) {
                        waktu = timeMatch[0]; 
                        const indexWaktu = kiriWithdraw.indexOf(waktu);
                        userId = kiriWithdraw.substring(indexWaktu + waktu.length).trim();
                    }

                    const indexMinus = kananWithdraw.lastIndexOf('-');
                    let tujuanBank = "-";
                    let jumlah = "-";
                    let kolomKosong = ""; 

                    if (indexMinus !== -1) {
                        tujuanBank = kananWithdraw.substring(0, indexMinus).trim();
                        jumlah = kananWithdraw.substring(indexMinus + 1).trim();
                    } else {
                        tujuanBank = kananWithdraw;
                    }

                    const newRow = document.createElement('tr');
                    newRow.setAttribute('data-waktu', waktu);
                    newRow.setAttribute('data-userid', userId);
                    newRow.setAttribute('data-bank', tujuanBank);
                    newRow.setAttribute('data-kosong', kolomKosong);
                    newRow.setAttribute('data-jumlah', jumlah);

                    newRow.innerHTML = `
                        <td>${waktu}</td>
                        <td>${userId}</td>
                        <td>${tujuanBank}</td>
                        <td>${kolomKosong}</td>
                        <td class="glow-amount">${jumlah}</td>
                    `;

                    tableBody.insertBefore(newRow, tableBody.firstChild);
                }
            });

            if (!dataFound) {
                alert("Format data tidak dikenali. Pastikan teks mengandung kata 'Withdraw' dan 'ACCEPT'.");
                return;
            }

            inputField.value = "";
            inputField.focus();
        }

        function copyAllTableData() {
            const tableBody = document.getElementById('tableBody');
            const rows = tableBody.querySelectorAll('tr');

            if (rows.length === 0 || document.getElementById('emptyRow')) {
                alert("Tidak ada data hasil ekspor yang bisa disalin!");
                return;
            }

            let linesToCopy = [];

            rows.forEach(row => {
                const waktu = row.getAttribute('data-waktu');
                const userId = row.getAttribute('data-userid');
                const bank = row.getAttribute('data-bank');
                const kosong = row.getAttribute('data-kosong');
                const jumlah = row.getAttribute('data-jumlah');

                if (waktu) {
                    linesToCopy.push(`${waktu}\t${userId}\t${bank}\t${kosong}\t${jumlah}`);
                }
            });

            const textToCopy = linesToCopy.join('\n');
            navigator.clipboard.writeText(textToCopy);
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toastNotification');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        function resetInput() {
            const inputField = document.getElementById('inputData');
            const tableBody = document.getElementById('tableBody');
            
            inputField.value = "";
            
            tableBody.innerHTML = `
                <tr id="emptyRow">
                    <td colspan="5" class="empty-message">Belum ada data yang dimasukkan.</td>
                </tr>
            `;
            
            inputField.focus();
        }
    </script>

</body>
</html>
