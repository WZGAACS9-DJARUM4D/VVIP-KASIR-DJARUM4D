<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENERATOR LAPORAN ABOY - LUXURY EDITION</title>
    <style>
        /* Tema Mewah Dark Elegan */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top, #1a0b2e 0%, #0b0612 100%);
            color: #f1f1f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(20, 12, 32, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(152, 113, 245, 0.1);
            border: 1px solid rgba(152, 113, 245, 0.2);
        }

        h2 {
            margin-top: 0;
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(152, 113, 245, 0.2);
            padding-bottom: 12px;
            text-shadow: 0 0 10px rgba(152, 113, 245, 0.4);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #c3b4df;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 14px;
            background-color: #09050f;
            border: 2px solid #2e1d47;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #d633ff;
            box-shadow: 0 0 12px rgba(214, 51, 255, 0.3);
        }

        /* Tombol Aksi */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-submit {
            background: linear-gradient(135deg, #9871f5 0%, #d633ff 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(214, 51, 255, 0.3);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #825ad6 0%, #be20e6 100%);
            box-shadow: 0 6px 20px rgba(214, 51, 255, 0.5);
        }

        .btn-reset {
            background-color: #211438;
            color: #c3b4df;
            border: 1px solid #3d2665;
        }

        .btn-reset:hover {
            background-color: #2d1b4e;
            color: #fff;
        }

        /* Bagian Output */
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .output-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .btn-copy-all {
            background: transparent;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            flex: none;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .btn-copy-all:hover {
            background-color: #00e5ff;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        /* Pop-up Toast Notifikasi */
        .toast {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00e5ff 0%, #00b3cc 100%);
            color: #000;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(0, 229, 255, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .output-section {
            border-top: 2px solid rgba(152, 113, 245, 0.2);
            padding-top: 20px;
            overflow-x: auto;
        }

        /* Gaya Tabel Mewah */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            background-color: #1a1b26;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2e1d47;
        }

        th {
            background: linear-gradient(180deg, #00f0ff 0%, #00b3cc 100%);
            color: #000;
            font-weight: 700;
            text-transform: uppercase;
            padding: 14px 15px;
            text-align: left;
            border: 1px solid #040206;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border: 1px solid #2e1d47;
            color: #e1e1e6;
            font-size: 14px;
            font-weight: 500;
        }

        /* Corak Baris Selang-Seling Elegan */
        tr:nth-child(even) {
            background-color: #120e1c;
        }
        tr:nth-child(odd) {
            background-color: #181324;
        }

        .empty-message {
            color: #726291;
            font-style: italic;
            text-align: center;
            padding: 30px;
            background-color: #0e0818 !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RUMUS WD FLOP DJARUM4D</h1>
        
        <div class="form-group">
            <label for="inputData">Tempel Log Transaksi Mentah di Bawah ya wak!:</label>
            <textarea id="inputData" placeholder="Tempel data disini ya...
By : CS9👾"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-reset" onclick="resetInput()">Reset Input</button>
            <button class="btn-submit" onclick="submitData()">Submit Data</button>
        </div>

        <div class="output-section">
            <div class="output-header">
                <div class="output-title">Data Terurai Otomatis:</div>
                <button class="btn-copy-all" onclick="copyAllTableData()">Salin Semua Hasil Ekspor</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">WAKTU</th>
                        <th style="width: 20%;">Used ID</th>
                        <th style="width: 35%;">Tujuan Bank</th>
                        <th style="width: 15%;"></th>
                        <th style="width: 15%;">Jumlah</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr id="emptyRow">
                        <td colspan="5" class="empty-message">Belum ada data yang dimasukkan.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="toastNotification" class="toast">Data Siap Ditempel (Paste) ke Sheet!</div>

    <script>
        function submitData() {
            const inputField = document.getElementById('inputData');
            const tableBody = document.getElementById('tableBody');
            const emptyRow = document.getElementById('emptyRow');
            
            let rawText = inputField.value.trim();

            if (rawText === "") {
                alert("Kolom data masih kosong! Silakan isi terlebih dahulu.");
                return;
            }

            if (emptyRow) {
                emptyRow.remove();
            }

            const blocks = rawText.split('ACCEPT');
            let dataFound = false;

            blocks.forEach(block => {
                if (block.includes('Withdraw')) {
                    dataFound = true;

                    const parts = block.split('Withdraw');
                    const kiriWithdraw = parts[0].trim();  
                    const kananWithdraw = parts[1].trim(); 

                    const timeMatch = kiriWithdraw.match(/\d{2}:\d{2}:\d{2}/);
                    let waktu = "-";
                    let userId = "-";

                    if (timeMatch) {
                        waktu = timeMatch[0]; 
                        const indexWaktu = kiriWithdraw.indexOf(waktu);
                        userId = kiriWithdraw.substring(indexWaktu + waktu.length).trim();
                    }

                    const indexMinus = kananWithdraw.lastIndexOf('-');
                    let tujuanBank = "-";
                    let jumlah = "-";
                    let kolomKosong = ""; 

                    if (indexMinus !== -1) {
                        tujuanBank = kananWithdraw.substring(0, indexMinus).trim();
                        jumlah = kananWithdraw.substring(indexMinus + 1).trim();
                    } else {
                        tujuanBank = kananWithdraw;
                    }

                    // Buat tampilan visual baris tabel baru di web
                    const newRow = document.createElement('tr');
                    // Menggunakan data-attributes untuk menyimpan nilai teks murni agar gampang ditarik saat dicopy
                    newRow.setAttribute('data-waktu', waktu);
                    newRow.setAttribute('data-userid', userId);
                    newRow.setAttribute('data-bank', tujuanBank);
                    newRow.setAttribute('data-kosong', kolomKosong);
                    newRow.setAttribute('data-jumlah', jumlah);

                    newRow.innerHTML = `
                        <td>${waktu}</td>
                        <td>${userId}</td>
                        <td>${tujuanBank}</td>
                        <td>${kolomKosong}</td>
                        <td style="color: #00e5ff; font-weight: bold;">${jumlah}</td>
                    `;

                    // Data baru disisipkan ke baris paling atas tabel visual web
                    tableBody.insertBefore(newRow, tableBody.firstChild);
                }
            });

            if (!dataFound) {
                alert("Format data tidak dikenali. Pastikan teks mengandung kata 'Withdraw' dan 'ACCEPT'.");
                return;
            }

            inputField.value = "";
            inputField.focus();
        }

        // FUNGSI UTAMA BARU: Membaca langsung susunan baris dari elemen tabel aktif di layar
        function copyAllTableData() {
            const tableBody = document.getElementById('tableBody');
            const rows = tableBody.querySelectorAll('tr');

            // Cek jika tabel masih kosong atau hanya berisi pesan default
            if (rows.length === 0 || document.getElementById('emptyRow')) {
                alert("Tidak ada data hasil ekspor yang bisa disalin!");
                return;
            }

            let linesToCopy = [];

            // Looping membaca baris tabel secara berurutan persis seperti yang tampil di layar dari atas ke bawah
            rows.forEach(row => {
                const waktu = row.getAttribute('data-waktu');
                const userId = row.getAttribute('data-userid');
                const bank = row.getAttribute('data-bank');
                const kosong = row.getAttribute('data-kosong');
                const jumlah = row.getAttribute('data-jumlah');

                if (waktu) {
                    linesToCopy.push(`${waktu}\t${userId}\t${bank}\t${kosong}\t${jumlah}`);
                }
            });

            // Gabungkan baris teks dan langsung kirim ke clipboard
            const textToCopy = linesToCopy.join('\n');
            navigator.clipboard.writeText(textToCopy);
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toastNotification');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        function resetInput() {
            const inputField = document.getElementById('inputData');
            const tableBody = document.getElementById('tableBody');
            
            inputField.value = "";
            
            tableBody.innerHTML = `
                <tr id="emptyRow">
                    <td colspan="5" class="empty-message">Belum ada data yang dimasukkan.</td>
                </tr>
            `;
            
            inputField.focus();
        }
    </script>

</body>
</html>
